<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AgentStack Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 44px;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); }

  .agent-name {
    font-weight: 600;
    font-size: 14px;
  }

  .topbar-actions {
    display: flex;
    gap: 6px;
  }

  .btn {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 32px;
    touch-action: manipulation;
  }
  .btn:hover { color: var(--text); border-color: var(--accent); }
  .btn:active { transform: scale(0.97); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn.spawn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.spawn:hover { opacity: 0.9; }

  /* Sessions bar */
  .sessions-bar {
    display: flex;
    gap: 4px;
    padding: 6px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .sessions-bar::-webkit-scrollbar { display: none; }

  .session-tab {
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
    transition: all 0.15s;
    min-height: 32px;
    display: flex;
    align-items: center;
    touch-action: manipulation;
  }
  .session-tab:hover { color: var(--text); }
  .session-tab:active { transform: scale(0.97); }
  .session-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Terminal */
  #terminal-container {
    flex: 1;
    padding: 4px;
    overflow: hidden;
    position: relative;
  }

  /* Session ended overlay */
  .session-ended {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(13, 17, 23, 0.85);
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .session-ended.show { display: flex; }
  .session-ended p { color: var(--text-dim); font-size: 14px; }

  /* Keyboard toolbar */
  .keyboard-toolbar {
    display: flex;
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    gap: 2px;
    padding: 4px 6px;
  }
  .keyboard-toolbar::-webkit-scrollbar { display: none; }

  .keyboard-toolbar .kgroup {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .keyboard-toolbar .kgroup + .kgroup {
    margin-left: 4px;
    padding-left: 6px;
    border-left: 1px solid var(--border);
  }

  .kbtn {
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0;
    width: 38px;
    height: 34px;
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .kbtn:active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .kbtn.sticky {
    position: relative;
  }
  .kbtn.sticky.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .kbtn.wide { width: 48px; }
  .kbtn.danger-key:active {
    background: var(--red);
    border-color: var(--red);
  }

  /* Search bar */
  .search-bar {
    display: none;
    padding: 6px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    gap: 6px;
    align-items: center;
  }
  .search-bar.show { display: flex; }
  .search-bar input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar .btn { padding: 4px 8px; font-size: 11px; min-height: 28px; }

  /* Spawn dialog */
  .dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .dialog-overlay.show { display: flex; }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 90%;
    max-width: 360px;
  }

  .dialog h3 {
    margin-bottom: 12px;
    font-size: 16px;
  }

  .dialog-agents {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .agent-card {
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    touch-action: manipulation;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card:active { transform: scale(0.98); }
  .agent-card .name { font-weight: 600; font-size: 14px; }
  .agent-card .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .dialog-close {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    min-height: 44px;
    touch-action: manipulation;
  }

  /* Status bar */
  .statusbar {
    padding: 6px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="status-dot" id="statusDot"></div>
    <span class="agent-name" id="currentAgent">Terminal</span>
  </div>
  <div class="topbar-actions">
    <button class="btn spawn" onclick="showSpawnDialog()">+ New</button>
    <button class="btn danger" id="killBtn" onclick="killCurrent()" style="display:none">Kill</button>
  </div>
</div>

<!-- Session tabs -->
<div class="sessions-bar" id="sessionsBar"></div>

<!-- Terminal -->
<div id="terminal-container">
  <div class="session-ended" id="sessionEnded">
    <p>Session ended</p>
    <button class="btn spawn" onclick="showSpawnDialog()">New Session</button>
  </div>
</div>

<!-- Search bar (hidden by default) -->
<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" placeholder="Search..." />
  <button class="btn" onclick="doSearch(-1)">Prev</button>
  <button class="btn" onclick="doSearch(1)">Next</button>
  <button class="btn" onclick="closeSearch()">X</button>
</div>

<!-- Keyboard toolbar -->
<div class="keyboard-toolbar" id="keyToolbar">
  <!-- Modifier keys (sticky) -->
  <div class="kgroup">
    <button class="kbtn sticky" data-modifier="ctrl" id="modCtrl">Ctrl</button>
    <button class="kbtn sticky" data-modifier="alt" id="modAlt">Alt</button>
    <button class="kbtn sticky" data-modifier="shift" id="modShift">Shift</button>
  </div>
  <!-- Common Ctrl combos -->
  <div class="kgroup">
    <button class="kbtn danger-key" data-send="ctrl-c">C-c</button>
    <button class="kbtn" data-send="ctrl-d">C-d</button>
    <button class="kbtn" data-send="ctrl-z">C-z</button>
    <button class="kbtn" data-send="ctrl-l">C-l</button>
  </div>
  <!-- Navigation (supports long-press repeat) -->
  <div class="kgroup">
    <button class="kbtn" data-send="up" data-repeat="1">&#9650;</button>
    <button class="kbtn" data-send="down" data-repeat="1">&#9660;</button>
    <button class="kbtn" data-send="left" data-repeat="1">&#9664;</button>
    <button class="kbtn" data-send="right" data-repeat="1">&#9654;</button>
  </div>
  <!-- Special keys -->
  <div class="kgroup">
    <button class="kbtn wide" data-send="tab">Tab</button>
    <button class="kbtn wide" data-send="esc">Esc</button>
  </div>
  <!-- Extra useful keys -->
  <div class="kgroup">
    <button class="kbtn" data-send="home">Home</button>
    <button class="kbtn" data-send="end">End</button>
    <button class="kbtn" data-send="pgup">PgUp</button>
    <button class="kbtn" data-send="pgdn">PgDn</button>
  </div>
  <!-- Symbols hard to type on mobile -->
  <div class="kgroup">
    <button class="kbtn" data-send="|">|</button>
    <button class="kbtn" data-send="~">~</button>
    <button class="kbtn" data-send="/">/</button>
    <button class="kbtn" data-send="-">-</button>
    <button class="kbtn" data-send="_">_</button>
    <button class="kbtn" data-send="`">`</button>
  </div>
  <!-- Clipboard & Search -->
  <div class="kgroup">
    <button class="kbtn wide" id="pasteBtn">Paste</button>
    <button class="kbtn wide" id="searchBtn">Find</button>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span id="statusText">Connecting...</span>
  <span id="sessionCount">0 sessions</span>
</div>

<!-- Spawn dialog -->
<div class="dialog-overlay" id="spawnDialog">
  <div class="dialog">
    <h3>New Session</h3>
    <div class="dialog-agents" id="agentsList"></div>
    <button class="dialog-close" onclick="hideSpawnDialog()">Cancel</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-serialize@0.13.0/lib/addon-serialize.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';

let ws = null;
let term = null;
let fitAddon = null;
let serializeAddon = null;
let searchAddon = null;
let currentSession = null;
let sessions = [];
let agents = {};
let autoSpawned = false;
let reconnectAttempts = 0;
const MAX_RECONNECT_DELAY = 30000;

// Per-session serialized terminal state (clean, no corruption)
let sessionBuffers = {};
// Output batching for smooth rendering
let pendingOutput = '';
let outputRaf = null;

// Sticky modifier state
let ctrlActive = false;
let altActive = false;
let shiftActive = false;

// Key map: name -> actual escape sequence / byte
const KEY_MAP = {
  'ctrl-c': '\x03',
  'ctrl-d': '\x04',
  'ctrl-z': '\x1a',
  'ctrl-l': '\x0c',
  'up':     '\x1b[A',
  'down':   '\x1b[B',
  'left':   '\x1b[D',
  'right':  '\x1b[C',
  'tab':    '\t',
  'esc':    '\x1b',
  'home':   '\x1b[H',
  'end':    '\x1b[F',
  'pgup':   '\x1b[5~',
  'pgdn':   '\x1b[6~',
};

// Telegram WebApp
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (tg.themeParams?.bg_color) {
    document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
  }
}

// Get auth token from URL params
const params = new URLSearchParams(location.search);
const authToken = params.get('token') || '';

// Detect mobile / Telegram WebApp
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || !!window.Telegram?.WebApp;

// Haptic feedback helper
function haptic() {
  if (tg?.HapticFeedback) {
    tg.HapticFeedback.impactOccurred('light');
  } else if (navigator.vibrate) {
    navigator.vibrate(10);
  }
}

// ── Keyboard toolbar ──────────────────────────────────

function sendInput(data) {
  if (ws && ws.readyState === WebSocket.OPEN && currentSession) {
    ws.send(JSON.stringify({ type: 'input', session: currentSession, data: data }));
  }
}

function applyModifiers(key) {
  let data = key;
  if (shiftActive && key.length === 1) {
    data = key.toUpperCase();
  }
  if (ctrlActive && data.length === 1) {
    const upper = data.toUpperCase();
    if (upper >= 'A' && upper <= 'Z') {
      data = String.fromCharCode(upper.charCodeAt(0) - 64);
    }
  } else if (altActive && data.length === 1) {
    data = '\x1b' + data;
  }
  if (ctrlActive || altActive || shiftActive) {
    ctrlActive = false;
    altActive = false;
    shiftActive = false;
    document.getElementById('modCtrl').classList.remove('active');
    document.getElementById('modAlt').classList.remove('active');
    document.getElementById('modShift').classList.remove('active');
  }
  return data;
}

// Long-press key repeat state
let repeatTimer = null;
let repeatInterval = null;

function stopRepeat() {
  clearTimeout(repeatTimer);
  clearInterval(repeatInterval);
  repeatTimer = null;
  repeatInterval = null;
}

// Bind toolbar buttons using pointer events for long-press support
document.getElementById('keyToolbar').addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('.kbtn');
  if (!btn) return;
  e.preventDefault();

  haptic();

  // Sticky modifier toggle
  if (btn.dataset.modifier === 'ctrl') {
    ctrlActive = !ctrlActive;
    btn.classList.toggle('active', ctrlActive);
    if (ctrlActive) { altActive = false; document.getElementById('modAlt').classList.remove('active'); }
    term?.focus();
    return;
  }
  if (btn.dataset.modifier === 'alt') {
    altActive = !altActive;
    btn.classList.toggle('active', altActive);
    if (altActive) { ctrlActive = false; document.getElementById('modCtrl').classList.remove('active'); }
    term?.focus();
    return;
  }
  if (btn.dataset.modifier === 'shift') {
    shiftActive = !shiftActive;
    btn.classList.toggle('active', shiftActive);
    term?.focus();
    return;
  }

  // Send key
  if (btn.dataset.send) {
    const seq = KEY_MAP[btn.dataset.send] || btn.dataset.send;
    sendInput(seq);

    // Reset modifiers after a key press
    if (ctrlActive || altActive || shiftActive) {
      ctrlActive = false; altActive = false; shiftActive = false;
      document.getElementById('modCtrl').classList.remove('active');
      document.getElementById('modAlt').classList.remove('active');
      document.getElementById('modShift').classList.remove('active');
    }

    // Long-press repeat for navigation keys
    if (btn.dataset.repeat) {
      stopRepeat();
      repeatTimer = setTimeout(() => {
        repeatInterval = setInterval(() => {
          sendInput(seq);
          haptic();
        }, 80);
      }, 400);
    }

    term?.focus();
  }
});

// Stop repeat on pointer up/leave/cancel
['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
  document.getElementById('keyToolbar').addEventListener(evt, stopRepeat);
});

// Prevent toolbar from stealing focus
document.getElementById('keyToolbar').addEventListener('mousedown', (e) => {
  e.preventDefault();
});
document.getElementById('keyToolbar').addEventListener('touchstart', (e) => {
  // Don't preventDefault — it would block pointer events
}, { passive: true });

// Paste button
document.getElementById('pasteBtn').addEventListener('pointerdown', async (e) => {
  e.preventDefault();
  haptic();
  try {
    const text = await navigator.clipboard.readText();
    if (text) sendInput(text);
  } catch {
    const text = prompt('Paste text:');
    if (text) sendInput(text);
  }
  term?.focus();
});

// Search button
document.getElementById('searchBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  haptic();
  toggleSearch();
});

// ── Search ────────────────────────────────────────────

function toggleSearch() {
  const bar = document.getElementById('searchBar');
  if (bar.classList.contains('show')) {
    closeSearch();
  } else {
    bar.classList.add('show');
    document.getElementById('searchInput').focus();
    doFit();
  }
}

function closeSearch() {
  document.getElementById('searchBar').classList.remove('show');
  if (searchAddon) searchAddon.clearDecorations();
  term?.focus();
  doFit();
}

function doSearch(direction) {
  if (!searchAddon) return;
  const query = document.getElementById('searchInput').value;
  if (!query) return;
  if (direction > 0) {
    searchAddon.findNext(query);
  } else {
    searchAddon.findPrevious(query);
  }
}

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    doSearch(e.shiftKey ? -1 : 1);
    e.preventDefault();
  } else if (e.key === 'Escape') {
    closeSearch();
    e.preventDefault();
  }
});

// ── Terminal ──────────────────────────────────────────

function initTerminal() {
  term = new Terminal({
    theme: {
      background: '#0d1117',
      foreground: '#e6edf3',
      cursor: '#58a6ff',
      cursorAccent: '#0d1117',
      selectionBackground: '#264f78',
      black: '#484f58',
      red: '#ff7b72',
      green: '#3fb950',
      yellow: '#d29922',
      blue: '#58a6ff',
      magenta: '#bc8cff',
      cyan: '#39c5cf',
      white: '#b1bac4',
      brightBlack: '#6e7681',
      brightRed: '#ffa198',
      brightGreen: '#56d364',
      brightYellow: '#e3b341',
      brightBlue: '#79c0ff',
      brightMagenta: '#d2a8ff',
      brightCyan: '#56d4dd',
      brightWhite: '#f0f6fc',
    },
    fontFamily: "'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
    fontSize: isMobile ? 12 : 13,
    lineHeight: 1.2,
    cursorBlink: true,
    cursorStyle: 'bar',
    scrollback: 10000,
    allowProposedApi: true,
    smoothScrollDuration: 0,
  });

  // Core addons
  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());

  // Serialize addon for clean session buffer snapshots
  serializeAddon = new SerializeAddon.SerializeAddon();
  term.loadAddon(serializeAddon);

  // Unicode11 for proper CJK/emoji character widths
  const unicode11 = new Unicode11Addon.Unicode11Addon();
  term.loadAddon(unicode11);
  term.unicode.activeVersion = '11';

  // Search addon
  searchAddon = new SearchAddon.SearchAddon();
  term.loadAddon(searchAddon);

  const container = document.getElementById('terminal-container');
  term.open(container);

  // WebGL renderer — massive performance boost (fallback to canvas on failure)
  try {
    const webgl = new WebglAddon.WebglAddon();
    webgl.onContextLoss(() => { webgl.dispose(); });
    term.loadAddon(webgl);
  } catch (e) {
    console.warn('WebGL renderer not available, using canvas fallback:', e);
  }

  // Fix mobile keyboard: disable autocorrect/autocomplete on xterm's hidden textarea
  const xtermTextarea = container.querySelector('.xterm-helper-textarea');
  if (xtermTextarea) {
    xtermTextarea.setAttribute('autocapitalize', 'off');
    xtermTextarea.setAttribute('autocomplete', 'off');
    xtermTextarea.setAttribute('autocorrect', 'off');
    xtermTextarea.setAttribute('spellcheck', 'false');
    // 'text' keeps the keyboard visible; 'none' hides it on some Androids
    // We use 'text' but suppress composition-based double input below
    xtermTextarea.setAttribute('inputmode', 'text');

    // Robust composition handling to prevent double-typing
    let composing = false;
    let lastComposedData = '';

    xtermTextarea.addEventListener('compositionstart', () => {
      composing = true;
      lastComposedData = '';
    });

    xtermTextarea.addEventListener('compositionupdate', (e) => {
      lastComposedData = e.data || '';
    });

    xtermTextarea.addEventListener('compositionend', (e) => {
      composing = false;
      // Clear the textarea to prevent xterm from processing stale composed text
      setTimeout(() => {
        lastComposedData = '';
      }, 100);
    });

    // Intercept beforeinput to suppress duplicate insertions during composition
    xtermTextarea.addEventListener('beforeinput', (e) => {
      if (composing && e.inputType === 'insertComposition') {
        // Let xterm handle the compositionend event instead
        return;
      }
    });
  }

  fitAddon.fit();

  // Copy on selection (mobile + desktop)
  term.onSelectionChange(() => {
    const sel = term.getSelection();
    if (sel && sel.length > 0) {
      navigator.clipboard.writeText(sel).catch(() => {});
    }
  });

  // Input sender with minimal batching
  let inputQueue = '';
  let inputTimer = null;
  const INPUT_DELAY = isMobile ? 12 : 4;

  function flushInput() {
    if (inputQueue && ws && ws.readyState === WebSocket.OPEN && currentSession) {
      ws.send(JSON.stringify({ type: 'input', session: currentSession, data: inputQueue }));
      inputQueue = '';
    }
    inputTimer = null;
  }

  term.onData(data => {
    const modified = applyModifiers(data);
    inputQueue += modified;
    if (!inputTimer) {
      inputTimer = setTimeout(flushInput, INPUT_DELAY);
    }
  });

  // Debounced resize
  let resizeTimer = null;
  term.onResize(({ cols, rows }) => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (ws && ws.readyState === WebSocket.OPEN && currentSession) {
        ws.send(JSON.stringify({ type: 'resize', session: currentSession, cols, rows }));
      }
    }, 100);
  });

  // Handle window resize
  window.addEventListener('resize', doFit);

  // Mobile keyboard resize handling with proper debounce
  if (window.visualViewport) {
    let vpResizeTimer = null;
    window.visualViewport.addEventListener('resize', () => {
      clearTimeout(vpResizeTimer);
      vpResizeTimer = setTimeout(() => {
        const cont = document.getElementById('terminal-container');
        const topbar = document.querySelector('.topbar');
        const sessbar = document.getElementById('sessionsBar');
        const toolbar = document.getElementById('keyToolbar');
        const statusbar = document.querySelector('.statusbar');
        const searchbar = document.getElementById('searchBar');
        const usedHeight = topbar.offsetHeight + sessbar.offsetHeight +
          toolbar.offsetHeight + statusbar.offsetHeight + searchbar.offsetHeight;
        cont.style.height = (window.visualViewport.height - usedHeight) + 'px';
        doFit();
      }, 150);
    });
  }
}

// Debounced fit
let fitTimer = null;
function doFit() {
  clearTimeout(fitTimer);
  fitTimer = setTimeout(() => {
    if (fitAddon) {
      try { fitAddon.fit(); } catch {}
    }
  }, 50);
}

// ── WebSocket ─────────────────────────────────────────

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', token: authToken }));
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
    reconnectAttempts = 0;
    ws.send(JSON.stringify({ type: 'list_sessions' }));
    ws.send(JSON.stringify({ type: 'list_agents' }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'output':
        // Store raw output per session for live accumulation
        if (!sessionBuffers[msg.session]) sessionBuffers[msg.session] = '';
        sessionBuffers[msg.session] += msg.data;
        // Trim raw buffer to prevent memory bloat (serialize on switch is cleaner)
        if (sessionBuffers[msg.session].length > 200000) {
          sessionBuffers[msg.session] = sessionBuffers[msg.session].slice(-120000);
        }
        if (msg.session === currentSession && term) {
          if (!pendingOutput) pendingOutput = '';
          pendingOutput += msg.data;
          if (!outputRaf) {
            outputRaf = requestAnimationFrame(() => {
              if (pendingOutput && term) {
                term.write(pendingOutput);
                pendingOutput = '';
              }
              outputRaf = null;
            });
          }
        }
        break;

      case 'sessions':
        sessions = msg.sessions || [];
        renderSessions();
        if (sessions.length === 0 && !autoSpawned) {
          autoSpawned = true;
          spawnSession('shell');
        } else if (sessions.length > 0 && !currentSession) {
          switchToSession(sessions[0]);
        }
        break;

      case 'agents':
        agents = msg.agents || {};
        break;

      case 'spawned':
        currentSession = msg.session;
        sessions = msg.sessions || sessions;
        sessionBuffers[msg.session] = '';
        renderSessions();
        document.getElementById('sessionEnded').classList.remove('show');
        switchToSession(msg.session);
        break;

      case 'killed':
        sessions = msg.sessions || sessions;
        delete sessionBuffers[msg.session];
        if (currentSession === msg.session) {
          if (sessions.length > 0) {
            currentSession = sessions[0];
            switchToSession(currentSession);
          } else {
            currentSession = null;
            document.getElementById('sessionEnded').classList.add('show');
          }
        }
        renderSessions();
        break;

      case 'replay':
        // Server sends replay data on re-attach
        if (msg.session === currentSession && term && msg.data) {
          term.write(msg.data);
        }
        break;

      case 'ping':
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'pong' }));
        }
        break;

      case 'error':
        if (term) term.write('\r\n\x1b[31m' + msg.message + '\x1b[0m\r\n');
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    reconnectAttempts++;
    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
    document.getElementById('statusText').textContent =
      `Reconnecting (attempt ${reconnectAttempts})...`;
    setTimeout(connect, delay);
  };

  ws.onerror = () => {
    ws.close();
  };
}

// ── Sessions ──────────────────────────────────────────

function renderSessions() {
  const bar = document.getElementById('sessionsBar');
  bar.innerHTML = '';

  sessions.forEach(name => {
    const tab = document.createElement('div');
    tab.className = 'session-tab' + (name === currentSession ? ' active' : '');
    tab.textContent = name;
    tab.onclick = () => switchToSession(name);
    bar.appendChild(tab);
  });

  document.getElementById('sessionCount').textContent = sessions.length + ' session(s)';
  document.getElementById('killBtn').style.display = currentSession ? '' : 'none';
}

function switchToSession(name) {
  // Save current session's terminal state via serialize (clean snapshot)
  if (currentSession && term && serializeAddon && currentSession !== name) {
    try {
      sessionBuffers[currentSession] = serializeAddon.serialize();
    } catch {
      // Keep raw buffer as fallback
    }
  }

  currentSession = name;
  document.getElementById('currentAgent').textContent = name;
  document.getElementById('killBtn').style.display = '';
  document.getElementById('sessionEnded').classList.remove('show');

  document.querySelectorAll('.session-tab').forEach(tab => {
    tab.classList.toggle('active', tab.textContent === name);
  });

  if (term) {
    term.reset();
    if (sessionBuffers[name]) {
      term.write(sessionBuffers[name]);
    }
  }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'attach', session: name }));
    if (fitAddon) fitAddon.fit();
  }
}

function showSpawnDialog() {
  const list = document.getElementById('agentsList');
  list.innerHTML = '';

  const shell = document.createElement('div');
  shell.className = 'agent-card';
  shell.innerHTML = '<div class="name">shell</div><div class="desc">New terminal — run anything</div>';
  shell.onclick = () => {
    const name = 'shell' + (sessions.filter(s => s.startsWith('shell')).length || '');
    spawnSession(name === 'shell0' ? 'shell' : name);
  };
  list.appendChild(shell);

  Object.entries(agents).forEach(([name, cfg]) => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `<div class="name">${name}</div><div class="desc">${cfg.description || 'Claude Code agent'}</div>`;
    card.onclick = () => spawnSession(name);
    list.appendChild(card);
  });

  const custom = document.createElement('div');
  custom.className = 'agent-card';
  custom.innerHTML = '<div class="name">custom...</div><div class="desc">Custom named session</div>';
  custom.onclick = () => {
    const name = prompt('Session name:');
    if (name) spawnSession(name.toLowerCase().replace(/[^a-z0-9_-]/g, ''));
  };
  list.appendChild(custom);

  document.getElementById('spawnDialog').classList.add('show');
}

function hideSpawnDialog() {
  document.getElementById('spawnDialog').classList.remove('show');
}

function spawnSession(name) {
  hideSpawnDialog();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'spawn', session: name }));
    document.getElementById('statusText').textContent = `Starting ${name}...`;
  }
}

function killCurrent() {
  if (!currentSession) return;
  if (!confirm(`Kill "${currentSession}"?`)) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'kill', session: currentSession }));
  }
}

// Init
initTerminal();
connect();
</script>
