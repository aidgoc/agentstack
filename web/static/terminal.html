<!--
  AgentStack Terminal UI
  ======================
  Full xterm.js terminal inside Telegram Mini App.

  Features:
    - WebGL-accelerated rendering (5-10x faster)
    - JetBrains Mono font with preload (no FOUT)
    - Telegram theme sync (adapts to user's theme)
    - Multi-session tabs with tmux persistence
    - Mobile keyboard toolbar (Ctrl, Alt, arrows, special chars)
    - Pinch-to-zoom font sizing
    - Drag-and-drop file upload
    - Copy-on-select, search, paste button
    - Reconnect overlay with exponential backoff
    - Device Attribute response filtering (ghost text fix)
    - Per-session output buffering with RAF batching

  Auth: HMAC token passed as ?token= query param, generated by bot.py
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AgentStack Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<!-- Preload terminal font to prevent FOUT -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.18/files/jetbrains-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.18/files/jetbrains-mono-latin-400-normal.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 40px;
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); }
  .agent-name { font-weight: 600; font-size: 13px; }
  .topbar-actions { display: flex; gap: 4px; }

  .btn {
    background: var(--surface); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; min-height: 30px;
    touch-action: manipulation;
  }
  .btn:hover { color: var(--text); border-color: var(--accent); }
  .btn:active { transform: scale(0.97); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn.spawn { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Sessions bar */
  .sessions-bar {
    display: flex; gap: 3px; padding: 4px 10px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    overflow-x: auto; flex-shrink: 0;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .sessions-bar::-webkit-scrollbar { display: none; }

  .session-tab {
    padding: 4px 12px; border-radius: 4px; font-size: 11px;
    cursor: pointer; background: var(--bg); border: 1px solid var(--border);
    color: var(--text-dim); white-space: nowrap; transition: all 0.15s;
    min-height: 28px; display: flex; align-items: center;
    touch-action: manipulation;
  }
  .session-tab:hover { color: var(--text); }
  .session-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .session-tab.unattached {
    border-style: dashed; opacity: 0.7;
  }

  /* Terminal container */
  #terminal-container {
    flex: 1; padding: 2px; overflow: hidden; position: relative;
  }

  /* Drop zone overlay */
  .drop-zone {
    display: none; position: absolute; inset: 0;
    background: rgba(88, 166, 255, 0.15);
    border: 2px dashed var(--accent);
    z-index: 20; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; border-radius: 8px; margin: 8px;
  }
  .drop-zone.show { display: flex; }
  .drop-zone p { color: var(--accent); font-size: 16px; font-weight: 600; }
  .drop-zone .sub { color: var(--text-dim); font-size: 12px; }

  /* Session ended overlay */
  .session-ended {
    display: none; position: absolute; inset: 0;
    background: rgba(13, 17, 23, 0.85); z-index: 10;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .session-ended.show { display: flex; }
  .session-ended p { color: var(--text-dim); font-size: 14px; }

  /* Reconnect overlay */
  .reconnect-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(13, 17, 23, 0.7); z-index: 15;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
  }
  .reconnect-overlay.show { display: flex; }
  .reconnect-overlay .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top: 2px solid var(--accent); border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .reconnect-overlay p { color: var(--text-dim); font-size: 13px; }

  /* Keyboard toolbar */
  .keyboard-toolbar {
    display: flex; flex-shrink: 0; background: var(--surface);
    border-top: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; gap: 2px; padding: 3px 6px;
  }
  .keyboard-toolbar::-webkit-scrollbar { display: none; }
  .keyboard-toolbar .kgroup { display: flex; gap: 2px; flex-shrink: 0; }
  .keyboard-toolbar .kgroup + .kgroup {
    margin-left: 3px; padding-left: 5px;
    border-left: 1px solid var(--border);
  }

  .kbtn {
    background: var(--bg); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 0; width: 36px; height: 32px; font-size: 10px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    cursor: pointer; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .kbtn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .kbtn.sticky.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .kbtn.wide { width: 44px; }
  .kbtn.danger-key:active { background: var(--red); border-color: var(--red); }

  /* Search bar */
  .search-bar {
    display: none; padding: 4px 10px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
    gap: 4px; align-items: center;
  }
  .search-bar.show { display: flex; }
  .search-bar input {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; font-size: 12px; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar .btn { padding: 3px 6px; font-size: 10px; min-height: 26px; }

  /* Spawn dialog */
  .dialog-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .dialog-overlay.show { display: flex; }
  .dialog {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; width: 90%; max-width: 340px;
  }
  .dialog h3 { margin-bottom: 10px; font-size: 15px; }
  .dialog-agents {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 300px; overflow-y: auto;
  }
  .agent-card {
    padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
    min-height: 40px; touch-action: manipulation;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card:active { transform: scale(0.98); }
  .agent-card .name { font-weight: 600; font-size: 13px; }
  .agent-card .desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .dialog-close {
    margin-top: 10px; width: 100%; padding: 8px;
    background: var(--bg); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer; font-size: 12px; min-height: 40px;
    touch-action: manipulation;
  }

  /* Status bar */
  .statusbar {
    padding: 4px 10px; background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-dim);
    display: flex; justify-content: space-between; flex-shrink: 0;
  }

  /* Toast notifications */
  .toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 16px; font-size: 12px; z-index: 200;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="status-dot" id="statusDot"></div>
    <span class="agent-name" id="currentAgent">Terminal</span>
  </div>
  <div class="topbar-actions">
    <button class="btn spawn" onclick="showSpawnDialog()">+ New</button>
    <button class="btn danger" id="killBtn" onclick="killCurrent()" style="display:none">Kill</button>
  </div>
</div>

<!-- Session tabs -->
<div class="sessions-bar" id="sessionsBar"></div>

<!-- Terminal -->
<div id="terminal-container">
  <div class="drop-zone" id="dropZone">
    <p>Drop file to upload</p>
    <p class="sub">File will be saved to ~/uploads/</p>
  </div>
  <div class="session-ended" id="sessionEnded">
    <p>Session ended</p>
    <button class="btn spawn" onclick="showSpawnDialog()">New Session</button>
  </div>
  <div class="reconnect-overlay" id="reconnectOverlay">
    <div class="spinner"></div>
    <p id="reconnectText">Reconnecting...</p>
  </div>
</div>

<!-- Search bar -->
<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" placeholder="Search..." />
  <button class="btn" onclick="doSearch(-1)">Prev</button>
  <button class="btn" onclick="doSearch(1)">Next</button>
  <button class="btn" onclick="closeSearch()">X</button>
</div>

<!-- Keyboard toolbar -->
<div class="keyboard-toolbar" id="keyToolbar">
  <div class="kgroup">
    <button class="kbtn sticky" data-modifier="ctrl" id="modCtrl">Ctrl</button>
    <button class="kbtn sticky" data-modifier="alt" id="modAlt">Alt</button>
    <button class="kbtn sticky" data-modifier="shift" id="modShift">Shift</button>
  </div>
  <div class="kgroup">
    <button class="kbtn danger-key" data-send="ctrl-c">C-c</button>
    <button class="kbtn" data-send="ctrl-d">C-d</button>
    <button class="kbtn" data-send="ctrl-z">C-z</button>
    <button class="kbtn" data-send="ctrl-l">C-l</button>
    <button class="kbtn" data-send="ctrl-a">C-a</button>
    <button class="kbtn" data-send="ctrl-r">C-r</button>
  </div>
  <div class="kgroup">
    <button class="kbtn" data-send="up" data-repeat="1">&#9650;</button>
    <button class="kbtn" data-send="down" data-repeat="1">&#9660;</button>
    <button class="kbtn" data-send="left" data-repeat="1">&#9664;</button>
    <button class="kbtn" data-send="right" data-repeat="1">&#9654;</button>
  </div>
  <div class="kgroup">
    <button class="kbtn wide" data-send="tab">Tab</button>
    <button class="kbtn wide" data-send="esc">Esc</button>
  </div>
  <div class="kgroup">
    <button class="kbtn" data-send="home">Hom</button>
    <button class="kbtn" data-send="end">End</button>
    <button class="kbtn" data-send="pgup">PgU</button>
    <button class="kbtn" data-send="pgdn">PgD</button>
  </div>
  <div class="kgroup">
    <button class="kbtn" data-send="|">|</button>
    <button class="kbtn" data-send="~">~</button>
    <button class="kbtn" data-send="/">/</button>
    <button class="kbtn" data-send="-">-</button>
    <button class="kbtn" data-send="_">_</button>
    <button class="kbtn" data-send="`">`</button>
    <button class="kbtn" data-send="$">$</button>
    <button class="kbtn" data-send="&">&amp;</button>
  </div>
  <div class="kgroup">
    <button class="kbtn wide" id="pasteBtn">Paste</button>
    <button class="kbtn wide" id="searchBtn">Find</button>
    <button class="kbtn wide" id="uploadBtn">File</button>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span id="statusText">Connecting...</span>
  <span id="sessionCount">0 sessions</span>
</div>

<!-- Spawn dialog -->
<div class="dialog-overlay" id="spawnDialog">
  <div class="dialog">
    <h3>New Session</h3>
    <div class="dialog-agents" id="agentsList"></div>
    <button class="dialog-close" onclick="hideSpawnDialog()">Cancel</button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" style="display:none" multiple>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-serialize@0.13.0/lib/addon-serialize.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
const API_BASE = location.origin;

let ws = null;
let term = null;
let fitAddon = null;
let serializeAddon = null;
let searchAddon = null;
let currentSession = null;
let previousSession = null; // For reconnect state recovery
let sessions = [];
let agents = {};
let autoSpawned = false;
let reconnectAttempts = 0;
let wasConnected = false;
const MAX_RECONNECT_DELAY = 15000;

// Per-session terminal state
let sessionBuffers = {};
let pendingOutput = '';
let outputRaf = null;
let sessionStartTime = 0;

// Strip Device Attribute responses that leak as visible text on session start
// Matches: \x1b[?N;N;Nc and bare fragments like "1;2c" or "0;276;0c"
const DA_RE = /\x1b\[\?[0-9;]*c/g;
const BARE_DA_RE = /[0-9]+(?:;[0-9]+)*c/g;
function stripDA(str, elapsed) {
  str = str.replace(DA_RE, '');
  // Only strip bare fragments in the first 2 seconds (they're DA response fragments)
  if (elapsed < 2000) {
    str = str.replace(BARE_DA_RE, '');
  }
  return str;
}

// Sticky modifiers
let ctrlActive = false, altActive = false, shiftActive = false;

// Font size for pinch-to-zoom
let currentFontSize = 0;
const MIN_FONT_SIZE = 8;
const MAX_FONT_SIZE = 24;

const KEY_MAP = {
  'ctrl-c': '\x03', 'ctrl-d': '\x04', 'ctrl-z': '\x1a',
  'ctrl-l': '\x0c', 'ctrl-a': '\x01', 'ctrl-r': '\x12',
  'up': '\x1b[A', 'down': '\x1b[B', 'left': '\x1b[D', 'right': '\x1b[C',
  'tab': '\t', 'esc': '\x1b',
  'home': '\x1b[H', 'end': '\x1b[F', 'pgup': '\x1b[5~', 'pgdn': '\x1b[6~',
};

// ── Telegram WebApp ───────────────────────────────────

const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // Sync theme from Telegram
  const tp = tg.themeParams;
  if (tp) {
    if (tp.bg_color) document.documentElement.style.setProperty('--bg', tp.bg_color);
    if (tp.secondary_bg_color) document.documentElement.style.setProperty('--surface', tp.secondary_bg_color);
    if (tp.hint_color) document.documentElement.style.setProperty('--text-dim', tp.hint_color);
    if (tp.text_color) document.documentElement.style.setProperty('--text', tp.text_color);
    if (tp.button_color) document.documentElement.style.setProperty('--accent', tp.button_color);
  }
}

const params = new URLSearchParams(location.search);
const authToken = params.get('token') || '';
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || !!tg;

// ── Helpers ───────────────────────────────────────────

function haptic(style = 'light') {
  if (tg?.HapticFeedback) {
    tg.HapticFeedback.impactOccurred(style);
  } else if (navigator.vibrate) {
    navigator.vibrate(style === 'medium' ? 20 : 10);
  }
}

function showToast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function sendInput(data) {
  if (ws && ws.readyState === WebSocket.OPEN && currentSession) {
    ws.send(JSON.stringify({ type: 'input', session: currentSession, data }));
  }
}

function applyModifiers(key) {
  let data = key;
  if (shiftActive && key.length === 1) data = key.toUpperCase();
  if (ctrlActive && data.length === 1) {
    const upper = data.toUpperCase();
    if (upper >= 'A' && upper <= 'Z') data = String.fromCharCode(upper.charCodeAt(0) - 64);
  } else if (altActive && data.length === 1) {
    data = '\x1b' + data;
  }
  if (ctrlActive || altActive || shiftActive) {
    ctrlActive = false; altActive = false; shiftActive = false;
    document.getElementById('modCtrl').classList.remove('active');
    document.getElementById('modAlt').classList.remove('active');
    document.getElementById('modShift').classList.remove('active');
  }
  return data;
}

// ── Keyboard toolbar ──────────────────────────────────

let repeatTimer = null, repeatInterval = null;
function stopRepeat() {
  clearTimeout(repeatTimer); clearInterval(repeatInterval);
  repeatTimer = null; repeatInterval = null;
}

document.getElementById('keyToolbar').addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('.kbtn');
  if (!btn) return;
  e.preventDefault();
  haptic();

  if (btn.dataset.modifier) {
    const mod = btn.dataset.modifier;
    if (mod === 'ctrl') {
      ctrlActive = !ctrlActive;
      btn.classList.toggle('active', ctrlActive);
      if (ctrlActive) { altActive = false; document.getElementById('modAlt').classList.remove('active'); }
    } else if (mod === 'alt') {
      altActive = !altActive;
      btn.classList.toggle('active', altActive);
      if (altActive) { ctrlActive = false; document.getElementById('modCtrl').classList.remove('active'); }
    } else if (mod === 'shift') {
      shiftActive = !shiftActive;
      btn.classList.toggle('active', shiftActive);
    }
    term?.focus();
    return;
  }

  if (btn.dataset.send) {
    const seq = KEY_MAP[btn.dataset.send] || btn.dataset.send;
    sendInput(seq);
    if (ctrlActive || altActive || shiftActive) {
      ctrlActive = false; altActive = false; shiftActive = false;
      document.getElementById('modCtrl').classList.remove('active');
      document.getElementById('modAlt').classList.remove('active');
      document.getElementById('modShift').classList.remove('active');
    }
    if (btn.dataset.repeat) {
      stopRepeat();
      repeatTimer = setTimeout(() => {
        repeatInterval = setInterval(() => { sendInput(seq); haptic(); }, 70);
      }, 350);
    }
    term?.focus();
  }
});

['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
  document.getElementById('keyToolbar').addEventListener(evt, stopRepeat);
});
document.getElementById('keyToolbar').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('keyToolbar').addEventListener('touchstart', () => {}, { passive: true });

// Paste
document.getElementById('pasteBtn').addEventListener('pointerdown', async (e) => {
  e.preventDefault(); haptic();
  try {
    const text = await navigator.clipboard.readText();
    if (text) sendInput(text);
  } catch {
    const text = prompt('Paste text:');
    if (text) sendInput(text);
  }
  term?.focus();
});

// Search
document.getElementById('searchBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault(); haptic(); toggleSearch();
});

// Upload
document.getElementById('uploadBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault(); haptic();
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  uploadFiles(e.target.files);
  e.target.value = '';
});

// ── File Upload ───────────────────────────────────────

async function uploadFiles(files) {
  if (!files || files.length === 0) return;
  for (const file of files) {
    const form = new FormData();
    form.append('file', file);
    try {
      const resp = await fetch(`${API_BASE}/api/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` },
        body: form,
      });
      const data = await resp.json();
      if (data.ok) {
        showToast(`Uploaded: ${file.name}`);
        haptic('medium');
      } else {
        showToast(`Error: ${data.error}`);
      }
    } catch (err) {
      showToast(`Upload failed: ${err.message}`);
    }
  }
}

// ── Drag & Drop ───────────────────────────────────────

const container = document.getElementById('terminal-container');
let dragCounter = 0;

container.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  document.getElementById('dropZone').classList.add('show');
});

container.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    document.getElementById('dropZone').classList.remove('show');
  }
});

container.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

container.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  document.getElementById('dropZone').classList.remove('show');
  if (e.dataTransfer.files.length > 0) {
    uploadFiles(e.dataTransfer.files);
  }
});

// ── Search ────────────────────────────────────────────

function toggleSearch() {
  const bar = document.getElementById('searchBar');
  if (bar.classList.contains('show')) { closeSearch(); } else {
    bar.classList.add('show');
    document.getElementById('searchInput').focus();
    doFit();
  }
}
function closeSearch() {
  document.getElementById('searchBar').classList.remove('show');
  if (searchAddon) searchAddon.clearDecorations();
  term?.focus(); doFit();
}
function doSearch(dir) {
  if (!searchAddon) return;
  const q = document.getElementById('searchInput').value;
  if (!q) return;
  dir > 0 ? searchAddon.findNext(q) : searchAddon.findPrevious(q);
}
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { doSearch(e.shiftKey ? -1 : 1); e.preventDefault(); }
  else if (e.key === 'Escape') { closeSearch(); e.preventDefault(); }
});

// ── Terminal ──────────────────────────────────────────

function initTerminal() {
  currentFontSize = isMobile ? 12 : 13;

  term = new Terminal({
    theme: {
      background: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0d1117',
      foreground: getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#e6edf3',
      cursor: '#58a6ff', cursorAccent: '#0d1117',
      selectionBackground: '#264f78',
      black: '#484f58', red: '#ff7b72', green: '#3fb950',
      yellow: '#d29922', blue: '#58a6ff', magenta: '#bc8cff',
      cyan: '#39c5cf', white: '#b1bac4',
      brightBlack: '#6e7681', brightRed: '#ffa198', brightGreen: '#56d364',
      brightYellow: '#e3b341', brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
      brightCyan: '#56d4dd', brightWhite: '#f0f6fc',
    },
    fontFamily: "'JetBrains Mono', 'SF Mono', 'Fira Code', Menlo, monospace",
    fontSize: currentFontSize,
    lineHeight: 1.2,
    cursorBlink: true,
    cursorStyle: 'bar',
    scrollback: 15000,
    allowProposedApi: true,
    smoothScrollDuration: 0,
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());

  serializeAddon = new SerializeAddon.SerializeAddon();
  term.loadAddon(serializeAddon);

  const unicode11 = new Unicode11Addon.Unicode11Addon();
  term.loadAddon(unicode11);
  term.unicode.activeVersion = '11';

  searchAddon = new SearchAddon.SearchAddon();
  term.loadAddon(searchAddon);

  const termContainer = document.getElementById('terminal-container');
  term.open(termContainer);

  // WebGL renderer
  try {
    const webgl = new WebglAddon.WebglAddon();
    webgl.onContextLoss(() => { webgl.dispose(); });
    term.loadAddon(webgl);
  } catch (e) {
    console.warn('WebGL not available:', e);
  }

  // Fix mobile keyboard: suppress autocorrect without interfering with xterm's input handling
  const xtermTextarea = termContainer.querySelector('.xterm-helper-textarea');
  if (xtermTextarea) {
    xtermTextarea.setAttribute('autocapitalize', 'off');
    xtermTextarea.setAttribute('autocomplete', 'off');
    xtermTextarea.setAttribute('autocorrect', 'off');
    xtermTextarea.setAttribute('spellcheck', 'false');
    xtermTextarea.setAttribute('inputmode', 'text');
  }

  fitAddon.fit();

  // Copy on selection
  term.onSelectionChange(() => {
    const sel = term.getSelection();
    if (sel && sel.length > 0) {
      navigator.clipboard.writeText(sel).catch(() => {});
      if (isMobile) showToast('Copied');
    }
  });

  // Input sender
  let inputQueue = '';
  let inputTimer = null;
  const INPUT_DELAY = isMobile ? 10 : 3;

  function flushInput() {
    if (inputQueue && ws && ws.readyState === WebSocket.OPEN && currentSession) {
      ws.send(JSON.stringify({ type: 'input', session: currentSession, data: inputQueue }));
      inputQueue = '';
    }
    inputTimer = null;
  }

  term.onData(data => {
    inputQueue += applyModifiers(data);
    if (!inputTimer) inputTimer = setTimeout(flushInput, INPUT_DELAY);
  });

  // Debounced resize
  let resizeTimer = null;
  term.onResize(({ cols, rows }) => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (ws && ws.readyState === WebSocket.OPEN && currentSession) {
        ws.send(JSON.stringify({ type: 'resize', session: currentSession, cols, rows }));
      }
    }, 100);
  });

  window.addEventListener('resize', doFit);

  // Mobile viewport resize
  if (window.visualViewport) {
    let vpTimer = null;
    window.visualViewport.addEventListener('resize', () => {
      clearTimeout(vpTimer);
      vpTimer = setTimeout(() => {
        const cont = document.getElementById('terminal-container');
        const usedHeight = document.querySelector('.topbar').offsetHeight +
          document.getElementById('sessionsBar').offsetHeight +
          document.getElementById('keyToolbar').offsetHeight +
          document.querySelector('.statusbar').offsetHeight +
          document.getElementById('searchBar').offsetHeight;
        cont.style.height = (window.visualViewport.height - usedHeight) + 'px';
        doFit();
      }, 120);
    });
  }

  // Pinch-to-zoom font size
  if (isMobile) {
    let lastPinchDist = 0;
    termContainer.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastPinchDist = Math.sqrt(dx * dx + dy * dy);
      }
    }, { passive: true });

    termContainer.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastPinchDist > 0) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const delta = dist - lastPinchDist;
        if (Math.abs(delta) > 15) {
          const newSize = Math.min(MAX_FONT_SIZE, Math.max(MIN_FONT_SIZE,
            currentFontSize + (delta > 0 ? 1 : -1)));
          if (newSize !== currentFontSize) {
            currentFontSize = newSize;
            term.options.fontSize = currentFontSize;
            fitAddon.fit();
            haptic();
          }
          lastPinchDist = dist;
        }
      }
    }, { passive: true });

    termContainer.addEventListener('touchend', () => { lastPinchDist = 0; }, { passive: true });
  }
}

let fitTimer = null;
function doFit() {
  clearTimeout(fitTimer);
  fitTimer = setTimeout(() => {
    if (fitAddon) { try { fitAddon.fit(); } catch {} }
  }, 50);
}

// ── WebSocket ─────────────────────────────────────────

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', token: authToken }));
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
    document.getElementById('reconnectOverlay').classList.remove('show');
    reconnectAttempts = 0;

    // Request session list and agents
    ws.send(JSON.stringify({ type: 'list_sessions' }));
    ws.send(JSON.stringify({ type: 'list_agents' }));

    // If reconnecting, re-attach to the session we were on
    if (wasConnected && previousSession) {
      ws.send(JSON.stringify({ type: 'attach', session: previousSession }));
    }
    wasConnected = true;
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'output':
        if (!sessionBuffers[msg.session]) sessionBuffers[msg.session] = '';
        // Strip DA responses that leak as visible ghost text
        const elapsed = Date.now() - sessionStartTime;
        const cleanData = stripDA(msg.data, elapsed);
        sessionBuffers[msg.session] += cleanData;
        if (sessionBuffers[msg.session].length > 200000) {
          sessionBuffers[msg.session] = sessionBuffers[msg.session].slice(-120000);
        }
        if (msg.session === currentSession && term) {
          pendingOutput += cleanData;
          if (!outputRaf) {
            outputRaf = requestAnimationFrame(() => {
              if (pendingOutput && term) {
                term.write(pendingOutput);
                pendingOutput = '';
              }
              outputRaf = null;
            });
          }
        }
        break;

      case 'sessions':
        sessions = msg.sessions || [];
        renderSessions();
        if (sessions.length === 0 && !autoSpawned) {
          autoSpawned = true;
          spawnSession('shell');
        } else if (sessions.length > 0 && !currentSession) {
          // Re-attach to previous session or first available
          const target = previousSession && sessions.includes(previousSession)
            ? previousSession : sessions[0];
          switchToSession(target);
        }
        break;

      case 'agents':
        agents = msg.agents || {};
        break;

      case 'spawned':
        currentSession = msg.session;
        previousSession = msg.session;
        sessionStartTime = Date.now();
        sessions = msg.sessions || sessions;
        sessionBuffers[msg.session] = '';
        renderSessions();
        document.getElementById('sessionEnded').classList.remove('show');
        switchToSession(msg.session);
        break;

      case 'killed':
        sessions = msg.sessions || sessions;
        delete sessionBuffers[msg.session];
        if (currentSession === msg.session) {
          if (sessions.length > 0) {
            switchToSession(sessions[0]);
          } else {
            currentSession = null;
            document.getElementById('sessionEnded').classList.add('show');
          }
        }
        renderSessions();
        break;

      case 'replay':
        if (msg.session === currentSession && term && msg.data) {
          term.write(msg.data);
          // Store replay in buffer too
          if (!sessionBuffers[msg.session]) sessionBuffers[msg.session] = '';
          sessionBuffers[msg.session] += msg.data;
        }
        break;

      case 'ping':
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'pong' }));
        }
        break;

      case 'error':
        if (term) term.write('\r\n\x1b[31m' + msg.message + '\x1b[0m\r\n');
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    previousSession = currentSession;
    reconnectAttempts++;
    const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
    document.getElementById('statusText').textContent = `Reconnecting...`;
    document.getElementById('reconnectOverlay').classList.add('show');
    document.getElementById('reconnectText').textContent =
      `Reconnecting (attempt ${reconnectAttempts})...`;
    setTimeout(connect, delay);
  };

  ws.onerror = () => { ws.close(); };
}

// ── Sessions ──────────────────────────────────────────

function renderSessions() {
  const bar = document.getElementById('sessionsBar');
  bar.innerHTML = '';
  sessions.forEach(name => {
    const tab = document.createElement('div');
    tab.className = 'session-tab' + (name === currentSession ? ' active' : '');
    // If session is in tmux but not attached in pool, show as dashed
    if (!sessionBuffers[name] && name !== currentSession) {
      tab.classList.add('unattached');
    }
    tab.textContent = name;
    tab.onclick = () => switchToSession(name);
    bar.appendChild(tab);
  });
  document.getElementById('sessionCount').textContent = sessions.length + ' session(s)';
  document.getElementById('killBtn').style.display = currentSession ? '' : 'none';
}

function switchToSession(name) {
  if (currentSession && term && serializeAddon && currentSession !== name) {
    try { sessionBuffers[currentSession] = serializeAddon.serialize(); } catch {}
  }
  currentSession = name;
  previousSession = name;
  sessionStartTime = Date.now();
  document.getElementById('currentAgent').textContent = name;
  document.getElementById('killBtn').style.display = '';
  document.getElementById('sessionEnded').classList.remove('show');
  document.querySelectorAll('.session-tab').forEach(tab => {
    tab.classList.toggle('active', tab.textContent === name);
  });
  if (term) {
    term.reset();
    if (sessionBuffers[name]) term.write(sessionBuffers[name]);
  }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'attach', session: name }));
    if (fitAddon) fitAddon.fit();
  }
}

function showSpawnDialog() {
  const list = document.getElementById('agentsList');
  list.innerHTML = '';
  const shell = document.createElement('div');
  shell.className = 'agent-card';
  shell.innerHTML = '<div class="name">shell</div><div class="desc">New terminal — run anything</div>';
  shell.onclick = () => {
    const n = 'shell' + (sessions.filter(s => s.startsWith('shell')).length || '');
    spawnSession(n === 'shell0' ? 'shell' : n);
  };
  list.appendChild(shell);

  Object.entries(agents).forEach(([name, cfg]) => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `<div class="name">${name}</div><div class="desc">${cfg.description || 'Claude agent'}</div>`;
    card.onclick = () => spawnSession(name);
    list.appendChild(card);
  });

  const custom = document.createElement('div');
  custom.className = 'agent-card';
  custom.innerHTML = '<div class="name">custom...</div><div class="desc">Custom named session</div>';
  custom.onclick = () => {
    const n = prompt('Session name:');
    if (n) spawnSession(n.toLowerCase().replace(/[^a-z0-9_-]/g, ''));
  };
  list.appendChild(custom);
  document.getElementById('spawnDialog').classList.add('show');
}

function hideSpawnDialog() {
  document.getElementById('spawnDialog').classList.remove('show');
}

function spawnSession(name) {
  hideSpawnDialog();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'spawn', session: name }));
    document.getElementById('statusText').textContent = `Starting ${name}...`;
  }
}

function killCurrent() {
  if (!currentSession) return;
  if (!confirm(`Kill "${currentSession}"?`)) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'kill', session: currentSession }));
  }
}

// ── Visibility API: handle app suspend/resume ─────────

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // App resumed — check connection and re-fit
    if (ws && ws.readyState !== WebSocket.OPEN) {
      // Connection died while suspended — reconnect
      ws.close();
    }
    doFit();
    term?.focus();
  }
});

// ── Init ──────────────────────────────────────────────

initTerminal();
connect();
</script>
